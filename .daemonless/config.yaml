icon: ':material-server-network:'
cit:
  port: 8080
  ready: "Starting provider"

build:
  variants:
    - tag: latest
      containerfile: Containerfile
      default: true
    - tag: pkg
      containerfile: Containerfile.pkg
    - tag: pkg-latest
      containerfile: Containerfile.pkg
      args:
        BASE_VERSION: "15-latest"
    - tag: k8s
      containerfile: Containerfile.k8s
      puid: false
      tag_desc: "**Passthrough**. Traefik as PID 1, no s6 — for Kubernetes/helm & CLI-arg config."
